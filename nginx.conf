server {
    listen 80;
    server_name _;

    # Serve the React application
    root /usr/share/nginx/html; # Update this path to where your built 'dist' folder is located
    index index.html;

    # Handle React Router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy HTTP REST API requests
    location /api/ {
        proxy_pass http://localhost:3000; # Update with your actual backend API URL
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections (e.g., for real-time chat, notifications)
    location /ws/ {
        proxy_pass http://localhost:3000; # Update with your actual WebSocket server URL
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Disable timeouts for persistent socket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Cache static assets for better performance
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
